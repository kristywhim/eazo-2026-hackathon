<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eazo Hackathon 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #060D18; color: #EEF3FF;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .card {
      max-width: 420px; width: 100%;
      background: #0C1525; border: 1px solid #253D5C;
      border-radius: 20px; padding: 36px 32px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: #D9583A; display: flex; align-items: center;
      justify-content: center; font-size: 18px; color: #fff; font-weight: 900;
    }
    .logo-name { font-size: 18px; font-weight: 800; letter-spacing: -.02em; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #8A9CC0; margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 10px; }
    a {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 12px;
      background: #112034; border: 1px solid #253D5C;
      color: #EEF3FF; text-decoration: none;
      font-size: 14px; font-weight: 600;
      transition: border-color .15s, background .15s;
    }
    a:hover { background: #182A44; border-color: #2E4D72; }
    .icon { font-size: 20px; width: 28px; text-align: center; }
    .label { flex: 1; }
    .desc { font-size: 11px; color: #4A607E; margin-top: 1px; font-weight: 400; }
    .arr { color: #4A607E; font-size: 16px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">✳</div>
    <div class="logo-name">Eazo</div>
  </div>
  <h1>Hackathon 2026</h1>
  <p class="sub">Global · SF · NY · SH · Online</p>
  <div class="links">
    <a href="/vote">
      <span class="icon">🗳️</span>
      <span class="label">
        <div>Community Vote</div>
        <div class="desc">Vote for your favorite projects</div>
      </span>
      <span class="arr">›</span>
    </a>
    <a href="/onair">
      <span class="icon">📺</span>
      <span class="label">
        <div>Live Leaderboard</div>
        <div class="desc">Real-time rankings</div>
      </span>
      <span class="arr">›</span>
    </a>
    <a href="/peer-vote">
      <span class="icon">🤝</span>
      <span class="label">
        <div>Peer Vote</div>
        <div class="desc">Participants — vote for other teams</div>
      </span>
      <span class="arr">›</span>
    </a>
    <a href="/finalist?hub=sf">
      <span class="icon">🏆</span>
      <span class="label">
        <div>Finalist Announcement</div>
        <div class="desc">SF · NY · SH finalist lists</div>
      </span>
      <span class="arr">›</span>
    </a>
    <a href="/judge?hub=sf&code=JUDGE2026">
      <span class="icon">⚖️</span>
      <span class="label">
        <div>Judge Scorer</div>
        <div class="desc">Judges only</div>
      </span>
      <span class="arr">›</span>
    </a>
  </div>
</div>
</body>
</html>
