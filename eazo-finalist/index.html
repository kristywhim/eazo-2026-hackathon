<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eazo Hackathon 2026 — Award Rankings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* ── Eazo brand (canonical, shared across all pages) ── */
      --eazo-orange:     #FF6B20;
      --eazo-orange-dim: rgba(255,107,32,.13);
      --eazo-cream:      #F8ECD3;   /* warm off-white from brand logo */
      --eazo-gold:       #F5B030;
      --eazo-success:    #22C97A;

      /* ── Dark-theme palette (large-screen / projection surface) ── */
      --bg:   #060D18;
      --s1:   #0C1525;
      --s2:   #112034;
      --s3:   #182A44;
      --bdr:  #253D5C;
      --bdr2: #2E4D72;
      --t1:   #EEF3FF;
      --t2:   #8A9CC0;
      --t3:   #4A607E;

      /* Backward-compatible aliases (existing CSS rules reference these names) */
      --orange: var(--eazo-orange);
      --gold:   var(--eazo-gold);
      --up:     var(--eazo-success);
      --bronze: #B07A3F;

      /* ── Region colors (dark-theme variants, matched with onair / judge-scorer) ── */
      --hub-sf: #5898E8;
      --hub-ny: #9080E8;
      --hub-sh: #22C97A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--s1);
      border-bottom: 1px solid var(--bdr);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 32px;
      height: 72px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Eazo brand logo mark — cream rounded square + orange asterisk (matches brand sheet) */
    .logo-mark {
      width: 38px; height: 38px;
      background: var(--eazo-cream);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--eazo-orange);
      box-shadow: 0 0 18px rgba(248,236,211,0.18);
      flex-shrink: 0;
    }
    .logo-mark svg { width: 62%; height: 62%; display: block; }

    .header-wordmark { font-size: 19px; font-weight: 800; color: var(--eazo-cream); letter-spacing: -0.02em; }
    .header-title    { font-size: 17px; font-weight: 700; color: var(--t1); }
    .header-eyebrow  { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 1px; }
    .header-titleblock { display: flex; flex-direction: column; }
    .header-sep      { flex: 1; }

    .live-dot-wrap {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600;
      color: var(--up);
    }
    .live-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--up);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .live-dot.closed { background: var(--orange); animation: none; }
    .live-dot-wrap.closed { color: var(--orange); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.75); }
    }

    .refresh-label { font-size: 12px; color: var(--t3); }
    .calc-timestamp { font-size: 12px; color: var(--t3); margin-left: 16px; font-variant-numeric: tabular-nums; }

    /* ── Region tabs ── */
    .region-tabs {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px 32px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .region-tab {
      background: var(--s1);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      color: var(--t2);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 18px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .region-tab:hover { border-color: var(--bdr2); color: var(--t1); }
    .region-tab.active {
      background: var(--s2);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── Waiting (countdown) screen ── */
    #waiting-screen {
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      min-height: calc(100vh - 72px);
      text-align: center;
      padding: 40px;
    }
    .waiting-icon  { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
    .waiting-title { font-size: 30px; font-weight: 700; color: var(--t1); margin-bottom: 8px; }
    .waiting-sub   { font-size: 16px; color: var(--t2); margin-bottom: 36px; }
    .waiting-hub-pill {
      display: inline-block;
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
      background: var(--s2); border: 1px solid var(--bdr);
      color: var(--gold);
      padding: 6px 14px; border-radius: 20px;
      margin-bottom: 24px;
    }
    .countdown-box {
      background: var(--s1);
      border: 1px solid var(--bdr);
      border-radius: 16px;
      padding: 32px 40px;
      display: inline-flex;
      gap: 28px;
    }
    .countdown-segment { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .countdown-num {
      font-size: 52px; font-weight: 800; color: var(--t1);
      line-height: 1; font-variant-numeric: tabular-nums; min-width: 68px; text-align: center;
    }
    .countdown-label {
      font-size: 11px; font-weight: 600; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .countdown-sep { font-size: 44px; font-weight: 800; color: var(--t3); line-height: 1; align-self: center; margin-top: -8px; }

    /* ── Main content ── */
    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px 32px 80px;
    }

    /* ── 3-column "all regions" view ── */
    .all-regions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
    }

    .region-card {
      background: var(--s1);
      border: 1px solid var(--bdr);
      border-radius: 14px;
      overflow: hidden;
    }

    .region-card-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--bdr);
      display: flex; align-items: center; justify-content: space-between;
    }
    .region-card-name {
      font-size: 16px; font-weight: 700; color: var(--t1);
    }
    .region-card-meta { font-size: 11.5px; color: var(--t3); }

    .region-card.sf .region-card-name { color: var(--hub-sf); }
    .region-card.ny .region-card-name { color: var(--hub-ny); }
    .region-card.sh .region-card-name { color: var(--hub-sh); }

    .region-card-body {
      padding: 8px 0;
      max-height: calc(100vh - 280px);
      overflow-y: auto;
    }

    /* Per-team row in any view */
    .award-row {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--s2);
      transition: background 0.15s;
    }
    .award-row:hover { background: var(--s2); }
    .award-row:last-child { border-bottom: none; }

    .award-rank {
      font-size: 18px;
      font-weight: 800;
      color: var(--t3);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .award-rank.rank-1 { color: var(--gold);   font-size: 22px; }
    .award-rank.rank-2 { color: #C0C0C0;       font-size: 22px; }
    .award-rank.rank-3 { color: var(--bronze); font-size: 22px; }

    .award-info { min-width: 0; }
    .award-team {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--t1);
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .award-project {
      font-size: 12px;
      color: var(--t2);
      font-style: italic;
      margin-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .award-source-hub {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-left: 6px;
    }

    .award-score-block {
      text-align: right;
    }
    .award-composite {
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .award-composite-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--t3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ── Single-region detail view ── */
    .single-region-head {
      display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .single-region-title {
      font-size: 26px; font-weight: 800; color: var(--t1);
    }
    .single-region-count { font-size: 14px; color: var(--t2); }

    .detail-table {
      background: var(--s1);
      border: 1px solid var(--bdr);
      border-radius: 14px;
      overflow: hidden;
    }
    .detail-row {
      display: grid;
      grid-template-columns: 60px 1fr 110px 110px 110px 130px;
      gap: 16px;
      align-items: center;
      padding: 16px 22px;
      border-bottom: 1px solid var(--s2);
    }
    .detail-row.head {
      background: var(--s2);
      border-bottom: 1px solid var(--bdr);
      padding-top: 12px; padding-bottom: 12px;
    }
    .detail-row.head span {
      font-size: 10.5px;
      font-weight: 700;
      color: var(--t3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .detail-row.head .col-num { text-align: right; }

    .detail-row:last-child { border-bottom: none; }

    .detail-row .col-rank {
      font-size: 20px; font-weight: 800; color: var(--t3); text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .detail-row .col-rank.rank-1 { color: var(--gold);   }
    .detail-row .col-rank.rank-2 { color: #C0C0C0;        }
    .detail-row .col-rank.rank-3 { color: var(--bronze); }

    .detail-row .col-info { min-width: 0; }
    .detail-row .col-info .t1 {
      font-size: 16px; font-weight: 700; color: var(--t1); line-height: 1.25;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .detail-row .col-info .t2 {
      font-size: 13px; color: var(--t2); font-style: italic;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .detail-row .col-info .t3 {
      font-size: 11px; color: var(--t3); margin-top: 3px;
      letter-spacing: 0.04em;
    }

    .detail-row .col-num {
      text-align: right;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: var(--t1);
      font-weight: 600;
    }
    .detail-row .col-num small {
      display: block;
      color: var(--t3);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .composite-cell {
      text-align: right;
    }
    .composite-num {
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .composite-bar-wrap {
      margin-top: 6px;
      height: 4px;
      background: var(--s3);
      border-radius: 2px;
      overflow: hidden;
    }
    .composite-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--gold));
      border-radius: 2px;
    }

    /* ── Empty / loading / error ── */
    .empty-card {
      background: var(--s1);
      border: 1px dashed var(--bdr);
      border-radius: 14px;
      padding: 36px 24px;
      text-align: center;
      color: var(--t3);
      font-size: 13.5px;
      line-height: 1.6;
    }
    .empty-card strong { color: var(--t2); display: block; margin-bottom: 4px; }

    .loading-card {
      background: var(--s1);
      border: 1px solid var(--bdr);
      border-radius: 14px;
      padding: 36px 24px;
      text-align: center;
      color: var(--t3);
      font-size: 13.5px;
    }

    /* ── Responsive ── */
    @media (max-width: 1199px) {
      .all-regions-grid { grid-template-columns: 1fr; gap: 14px; }
      .region-card-body { max-height: none; }
    }

    @media (max-width: 767px) {
      .header-inner { padding: 0 16px; gap: 10px; height: 60px; }
      .header-title { font-size: 14px; }
      .header-eyebrow { font-size: 9px; }
      .refresh-label { display: none; }
      .calc-timestamp { display: none; }
      .live-dot-wrap { font-size: 11px; }

      .region-tabs { padding: 14px 16px 0; }
      .region-tab { padding: 7px 12px; font-size: 12.5px; }

      main { padding: 16px 16px 60px; }

      .detail-row {
        grid-template-columns: 44px 1fr 90px;
        grid-template-areas:
          "rank info comp"
          ". meta meta";
        gap: 8px 12px;
        padding: 12px 14px;
      }
      .detail-row .col-rank { grid-area: rank; font-size: 17px; }
      .detail-row .col-info { grid-area: info; }
      .detail-row .col-info .t1 { font-size: 14px; }
      .detail-row .col-info .t2 { font-size: 12px; }
      .detail-row .col-num.v,
      .detail-row .col-num.j,
      .detail-row .col-num.p { display: none; }
      .composite-cell { grid-area: comp; }
      .composite-num { font-size: 17px; }
      .detail-row.head { display: none; }

      .countdown-box { padding: 22px 16px; gap: 12px; }
      .countdown-num { font-size: 38px; min-width: 50px; }
      .countdown-sep { font-size: 32px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-inner">
    <div class="logo-mark"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g fill="currentColor"><ellipse cx="32" cy="32" rx="9" ry="22"/><ellipse cx="32" cy="32" rx="9" ry="22" transform="rotate(60 32 32)"/><ellipse cx="32" cy="32" rx="9" ry="22" transform="rotate(120 32 32)"/></g></svg></div>
    <div class="header-wordmark">Eazo</div>
    <div class="header-titleblock">
      <div class="header-eyebrow">Hackathon 2026</div>
      <div class="header-title">Award Rankings · Finalist Dashboard</div>
    </div>
    <div class="header-sep"></div>
    <span class="refresh-label">Auto-refresh every 30s</span>
    <div class="live-dot-wrap" id="liveStatus">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveLabel">LIVE</span>
    </div>
    <div class="calc-timestamp" id="calcTimestamp"></div>
  </div>
</header>

<!-- ── Region tabs ── -->
<div class="region-tabs" id="regionTabs">
  <button class="region-tab active" data-hub="all" onclick="setView('all', this)">🌐 All Regions</button>
  <button class="region-tab"        data-hub="sf"  onclick="setView('sf',  this)">🇺🇸 SF · Bay Area + Global Online</button>
  <button class="region-tab"        data-hub="ny"  onclick="setView('ny',  this)">🗽 NY · New York</button>
  <button class="region-tab"        data-hub="sh"  onclick="setView('sh',  this)">🇨🇳 SH · Shanghai + Asia Online</button>
</div>

<!-- ── Waiting (pre-deadline) screen ── -->
<div id="waiting-screen">
  <div class="waiting-icon">🏆</div>
  <div class="waiting-title">Voting Still Open</div>
  <div class="waiting-sub">Award rankings will appear here when voting closes.</div>
  <div class="waiting-hub-pill" id="waitingHubPill"></div>
  <div class="countdown-box">
    <div class="countdown-segment"><div class="countdown-num" id="cd-h">00</div><div class="countdown-label">Hours</div></div>
    <div class="countdown-sep">:</div>
    <div class="countdown-segment"><div class="countdown-num" id="cd-m">00</div><div class="countdown-label">Minutes</div></div>
    <div class="countdown-sep">:</div>
    <div class="countdown-segment"><div class="countdown-num" id="cd-s">00</div><div class="countdown-label">Seconds</div></div>
  </div>
</div>

<!-- ── Main content area ── -->
<main id="mainContent"></main>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const PRIZE_HUBS = ['sf', 'ny', 'sh'];

const HUB_DISPLAY = {
  sf: { flag: '🇺🇸', label: 'SF · Bay Area + Global Online', short: 'SF',  color: '#5898E8' },
  ny: { flag: '🗽',  label: 'NY · New York',                  short: 'NY',  color: '#9080E8' },
  sh: { flag: '🇨🇳', label: 'SH · Shanghai + Asia Online',    short: 'SH',  color: '#22C97A' },
};

const DEADLINES = {
  sf: new Date('2026-05-24T17:00:00Z'),  // SF + Global Online window (PT)
  ny: new Date('2026-05-25T01:00:00Z'),  // NY (ET)
  sh: new Date('2026-05-24T11:30:00Z'),  // SH + Asia Online window (CST) — canonical per /api/deadlines
};

const TRACK_LABELS = {
  superparent: 'SuperParent',
  companion:   'AI Companion',
  lifeos:      'Life OS',
  body:        'Body Intel',
  wildcard:    'Wildcard',
};

const SOURCE_HUB_LABELS = {
  sf: 'SF Offline', go: 'Global Online',
  sh: 'SH Offline', ao: 'Asia Online',
  ny: 'NY Offline',
};

// ── State ───────────────────────────────────────────────────────────────────
let currentView = 'all';       // 'all' | 'sf' | 'ny' | 'sh'
let countdownInterval = null;
let refreshInterval   = null;
let lastData = null;            // most recent /api/award-ranking payload

// ── Init ────────────────────────────────────────────────────────────────────
(function init() {
  const params = new URLSearchParams(window.location.search);
  const hubParam = (params.get('hub') || 'all').toLowerCase();
  const initialView = ['all','sf','ny','sh'].includes(hubParam) ? hubParam : 'all';

  // Sync tab UI
  document.querySelectorAll('.region-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.hub === initialView);
  });
  currentView = initialView;

  // Async: pull canonical deadlines from /api/deadlines (inline fallback otherwise)
  (async () => {
    try {
      const r = await fetch('/api/deadlines');
      if (!r.ok) return;
      const { voting = {} } = await r.json();
      for (const h of Object.keys(voting)) {
        if (DEADLINES[h]) DEADLINES[h] = new Date(voting[h]);
      }
    } catch (_) { /* keep inline */ }
  })();

  loadAndRender();

  // Refresh every 30s
  refreshInterval = setInterval(loadAndRender, 30000);
})();

function setView(hub, btn) {
  currentView = hub;
  document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  // Update URL without reloading
  const url = new URL(window.location.href);
  url.searchParams.set('hub', hub);
  history.replaceState({}, '', url);

  render();
}

// ── Data loading ────────────────────────────────────────────────────────────
let lastSpecialAwards = null;

async function loadAndRender() {
  try {
    const [rankRes, specialRes] = await Promise.all([
      fetch('/api/award-ranking?hub=all'),
      fetch('/api/special-awards?region=all'),
    ]);
    if (!rankRes.ok) throw new Error(`HTTP ${rankRes.status}`);
    lastData = await rankRes.json();
    if (specialRes.ok) {
      lastSpecialAwards = await specialRes.json();
    }
  } catch (err) {
    console.error('[finalist-dashboard] fetch error:', err);
    lastData = { error: err.message };
  }
  render();
}

// ── Voting-status logic ────────────────────────────────────────────────────
function regionVotingClosed(hub) {
  return new Date() >= DEADLINES[hub];
}
function nearestUpcomingDeadline() {
  const now = new Date();
  const upcoming = PRIZE_HUBS
    .map(h => ({ hub: h, t: DEADLINES[h] }))
    .filter(d => d.t > now)
    .sort((a, b) => a.t - b.t);
  return upcoming[0] || null;
}

// ── Render dispatcher ──────────────────────────────────────────────────────
function render() {
  if (!lastData) return;

  // Update timestamp + live-status pill
  if (lastData.calculatedAt) {
    const d = new Date(lastData.calculatedAt);
    document.getElementById('calcTimestamp').textContent =
      `Updated ${d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit' })}`;
  }

  // For 'all' view: show dashboard regardless of deadline state.
  // For single-region view: if voting still open, show countdown.
  const waiting = document.getElementById('waiting-screen');
  const main    = document.getElementById('mainContent');

  if (currentView !== 'all' && !regionVotingClosed(currentView)) {
    // Single region, voting still open → show countdown
    main.style.display = 'none';
    waiting.style.display = 'flex';
    document.getElementById('waitingHubPill').textContent = HUB_DISPLAY[currentView].label;
    updateLiveStatus(false);
    startCountdown(DEADLINES[currentView]);
    return;
  }

  waiting.style.display = 'none';
  main.style.display = 'block';
  clearInterval(countdownInterval);

  // Update live-status indicator
  const allClosed = PRIZE_HUBS.every(regionVotingClosed);
  updateLiveStatus(allClosed);

  if (lastData.error) {
    main.innerHTML = `<div class="empty-card"><strong>Could not load rankings</strong>${escHtml(lastData.error)}<br><br>Auto-retry in 30s.</div>`;
    return;
  }

  if (currentView === 'all') {
    renderAllRegions();
  } else {
    renderSingleRegion(currentView);
  }
}

function updateLiveStatus(allClosed) {
  const wrap  = document.getElementById('liveStatus');
  const dot   = document.getElementById('liveDot');
  const label = document.getElementById('liveLabel');
  if (allClosed) {
    wrap.classList.add('closed');
    dot.classList.add('closed');
    label.textContent = 'FINAL';
  } else {
    wrap.classList.remove('closed');
    dot.classList.remove('closed');
    label.textContent = 'LIVE';
  }
}

// ── All regions (3-column overview) ────────────────────────────────────────
function renderAllRegions() {
  const main = document.getElementById('mainContent');
  const regions = lastData.regions || {};

  main.innerHTML = `
    <div class="all-regions-grid">
      ${PRIZE_HUBS.map(hub => renderRegionCard(hub, regions[hub])).join('')}
    </div>
    ${renderSpecialAwardsSection()}
  `;
}

// ── Special Award section (>200 votes, not in Demo finalists) ────────────
function renderSpecialAwardsSection() {
  if (!lastSpecialAwards || !lastSpecialAwards.regions) return '';
  const regions = lastSpecialAwards.regions;
  const totalTeams = PRIZE_HUBS.reduce((n, h) => n + ((regions[h]?.teams || []).length), 0);

  return `
    <div style="margin-top:32px;">
      <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:14px;padding:0 2px;">
        <div style="font-size:18px;font-weight:800;color:var(--t1);">🎊 Special Award Candidates</div>
        <div style="font-size:13px;color:var(--t2);">
          Teams with any app &gt; 200 community votes that didn't make Demo · ${totalTeams} total
        </div>
      </div>
      <div class="all-regions-grid">
        ${PRIZE_HUBS.map(hub => renderSpecialAwardCard(hub, regions[hub])).join('')}
      </div>
    </div>
  `;
}

function renderSpecialAwardCard(hub, regionData) {
  const disp = HUB_DISPLAY[hub];
  const teams = (regionData?.teams || []).slice(0, 15);

  if (!teams.length) {
    return `
      <div class="region-card ${hub}">
        <div class="region-card-head">
          <div class="region-card-name">${disp.flag} ${disp.short} · Special Award</div>
          <div class="region-card-meta">0 candidates</div>
        </div>
        <div class="region-card-body">
          <div class="empty-card" style="margin: 14px; border: none; padding: 24px 12px;">
            No teams qualify yet. As community votes accumulate, teams with any app &gt; 200 votes (who don't make Demo) appear here.
          </div>
        </div>
      </div>`;
  }

  return `
    <div class="region-card ${hub}">
      <div class="region-card-head">
        <div class="region-card-name">${disp.flag} ${disp.short} · Special Award</div>
        <div class="region-card-meta">${teams.length} candidate${teams.length !== 1 ? 's' : ''} · $1,000 each</div>
      </div>
      <div class="region-card-body">
        ${teams.map(t => `
          <div class="award-row">
            <div class="award-rank" style="color: var(--gold);">🎊</div>
            <div class="award-info">
              <div class="award-team">${escHtml(t.teamName)}</div>
              <div class="award-project">Top app: ${escHtml(t.topAppName || '—')}</div>
            </div>
            <div class="award-score-block">
              <div class="award-composite" style="color: var(--t1);">${Number(t.bestAppVotes).toLocaleString()}</div>
              <div class="award-composite-label">votes</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderRegionCard(hub, regionData) {
  const disp = HUB_DISPLAY[hub];
  const closed = regionVotingClosed(hub);
  const teams = (regionData?.teams || []).slice(0, 12); // top 12 per region in overview

  if (!regionData || regionData.error) {
    return `
      <div class="region-card ${hub}">
        <div class="region-card-head">
          <div class="region-card-name">${disp.flag} ${disp.short}</div>
          <div class="region-card-meta">${closed ? 'Voting closed' : 'Voting open'}</div>
        </div>
        <div class="region-card-body">
          <div class="empty-card" style="margin: 14px; border: none; padding: 24px 12px;">
            ${regionData?.error ? escHtml(regionData.error) : 'No data'}
          </div>
        </div>
      </div>`;
  }

  if (!teams.length) {
    return `
      <div class="region-card ${hub}">
        <div class="region-card-head">
          <div class="region-card-name">${disp.flag} ${disp.short}</div>
          <div class="region-card-meta">${closed ? 'Voting closed' : 'Voting open'}</div>
        </div>
        <div class="region-card-body">
          <div class="empty-card" style="margin: 14px; border: none; padding: 24px 12px;">
            <strong>No finalists yet</strong>
            Run <code>calculate_finalists('${hub}')</code> in Supabase after peer voting closes to populate the bracket.
          </div>
        </div>
      </div>`;
  }

  return `
    <div class="region-card ${hub}">
      <div class="region-card-head">
        <div class="region-card-name">${disp.flag} ${disp.short}</div>
        <div class="region-card-meta">${teams.length} finalist${teams.length !== 1 ? 's' : ''} · ${closed ? 'Voting closed' : 'Live'}</div>
      </div>
      <div class="region-card-body">
        ${teams.map(t => `
          <div class="award-row" onclick="setView('${hub}', document.querySelector('.region-tab[data-hub=\\'${hub}\\']'))">
            <div class="award-rank rank-${t.awardRank <= 3 ? t.awardRank : 'n'}">${medal(t.awardRank)}</div>
            <div class="award-info">
              <div class="award-team">${escHtml(t.teamName)}<span class="award-source-hub">${SOURCE_HUB_LABELS[t.sourceHub] || ''}</span></div>
              <div class="award-project">${escHtml(t.projectName || '—')}</div>
            </div>
            <div class="award-score-block">
              <div class="award-composite">${(t.composite * 100).toFixed(1)}</div>
              <div class="award-composite-label">Score</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ── Single region (detail with V/J/P breakdown) ────────────────────────────
function renderSingleRegion(hub) {
  const main = document.getElementById('mainContent');
  const disp = HUB_DISPLAY[hub];
  const regionData = lastData.regions?.[hub];

  if (!regionData || regionData.error) {
    main.innerHTML = `
      <div class="single-region-head">
        <div class="single-region-title">${disp.flag} ${disp.label}</div>
      </div>
      <div class="empty-card">${regionData?.error ? escHtml(regionData.error) : 'No data for this region.'}</div>
    `;
    return;
  }

  const teams = regionData.teams || [];
  if (!teams.length) {
    main.innerHTML = `
      <div class="single-region-head">
        <div class="single-region-title">${disp.flag} ${disp.label}</div>
      </div>
      <div class="empty-card">
        <strong>No finalists yet</strong>
        Run <code>select calculate_finalists('${hub}');</code> in Supabase after peer voting closes
        to populate the 30-team bracket. Then refresh.
      </div>
    `;
    return;
  }

  // Note about composite normalization
  const hasJudgeScores = teams.some(t => t.J > 0);
  const judgeNote = hasJudgeScores ? '' : `
    <div class="empty-card" style="margin-bottom: 16px; text-align: left;">
      <strong>⚠️ No judge scores yet</strong>
      Composite is currently driven by community + peer votes only. As judges submit scores during Demo, this dashboard updates live (every 30s) and the ranking will shift.
    </div>
  `;

  main.innerHTML = `
    <div class="single-region-head">
      <div class="single-region-title">${disp.flag} ${disp.label}</div>
      <span class="single-region-count">${teams.length} finalist${teams.length !== 1 ? 's' : ''} · Ranked by composite (V·50% + J·40% + P·10%)</span>
    </div>
    ${judgeNote}
    <div class="detail-table">
      <div class="detail-row head">
        <span class="col-rank">Rank</span>
        <span>Team / Project</span>
        <span class="col-num">Community V</span>
        <span class="col-num">Judges J</span>
        <span class="col-num">Peer P</span>
        <span class="col-num">Composite</span>
      </div>
      ${teams.map(t => `
        <div class="detail-row">
          <div class="col-rank rank-${t.awardRank <= 3 ? t.awardRank : 'n'}">${medal(t.awardRank)}</div>
          <div class="col-info">
            <div class="t1">${escHtml(t.teamName)}</div>
            <div class="t2">${escHtml(t.projectName || '—')}</div>
            <div class="t3">
              ${TRACK_LABELS[t.track] || t.track}
              · ${SOURCE_HUB_LABELS[t.sourceHub] || t.sourceHub}
              · via ${t.qualificationMethod}
            </div>
          </div>
          <div class="col-num v">${Number(t.V).toLocaleString()}<small>votes</small></div>
          <div class="col-num j">${t.J.toFixed(1)}<small>/50 avg</small></div>
          <div class="col-num p">${t.P}<small>peer votes</small></div>
          <div class="composite-cell">
            <div class="composite-num">${(t.composite * 100).toFixed(1)}</div>
            <div class="composite-bar-wrap"><div class="composite-bar-fill" style="width:${Math.round(t.composite * 100)}%;"></div></div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Countdown ──────────────────────────────────────────────────────────────
function startCountdown(deadline) {
  if (countdownInterval) clearInterval(countdownInterval);
  tick(deadline);
  countdownInterval = setInterval(() => tick(deadline), 1000);
}
function tick(deadline) {
  const diff = Math.max(0, deadline - new Date());
  const total = Math.floor(diff / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  document.getElementById('cd-h').textContent = pad(h);
  document.getElementById('cd-m').textContent = pad(m);
  document.getElementById('cd-s').textContent = pad(s);
  if (diff === 0) {
    clearInterval(countdownInterval);
    loadAndRender();
  }
}
function pad(n) { return String(n).padStart(2, '0'); }

// ── Helpers ────────────────────────────────────────────────────────────────
function medal(rank) {
  if (rank === 1) return '🥇';
  if (rank === 2) return '🥈';
  if (rank === 3) return '🥉';
  return String(rank);
}
function escHtml(s) {
  if (s === null || s === undefined) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
