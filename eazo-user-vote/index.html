<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Eazo Hackathon SF 2026 — Vote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #F9F8F5;
      --surface: #FFFFFF;
      --surface2: #F1EFE8;
      --border: #D3D1C7;
      --border2: #B0ADAA;
      --text: #1A1916;
      --text2: #555350;
      --text3: #888780;
      --voted: #1D9E75;
      --urgent: #D85A30;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }

    .app-wrap {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
    }

    /* ── Sticky Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 11px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .event-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 1px;
    }

    .event-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .votes-pill-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .votes-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--text);
      color: #fff;
      padding: 6px 12px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 700;
      transition: background 0.25s;
    }

    .votes-pill.low   { background: var(--urgent); }
    .votes-pill.empty { background: var(--border2); }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ADE80;
      animation: dot-pulse 1.8s infinite;
      flex-shrink: 0;
    }

    .votes-pill.low   .pulse-dot { background: #FFD6C4; }
    .votes-pill.empty .pulse-dot { display: none; }

    .pip-row { display: flex; gap: 3px; }

    .pip {
      width: 8px;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.2s;
    }

    .pip.used { background: var(--voted); }

    .countdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .live-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--urgent);
    }

    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--urgent);
      animation: dot-pulse 1.5s infinite;
    }

    .countdown-right {
      font-size: 12px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .countdown-time {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      transition: color 0.3s;
    }

    .countdown-time.urgent { color: var(--urgent); }
    .countdown-closed { font-size: 13px; font-weight: 700; color: var(--border2); }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .filter-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
    }

    .filter-pill {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
      font-family: inherit;
    }

    .filter-pill:active { transform: scale(0.94); }
    .filter-pill.active { background: var(--text); color: #fff; border-color: var(--text); }

    /* ── Content ── */
    .content {
      padding: 10px 14px 100px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stats-line {
      font-size: 11.5px;
      color: var(--text3);
      text-align: center;
      padding: 2px 0;
    }

    .stats-line strong { color: var(--text2); font-weight: 600; }

    /* ── 2-column grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── Project Card ── */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 13px;
      overflow: hidden;
      position: relative;
      transition: border-color 0.25s;
    }

    .card.voted { border-color: var(--voted); }

    /* Portrait 9:16 thumbnail */
    .card-thumb {
      width: 100%;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb-placeholder-icon {
      font-size: 40px;
      opacity: 0.52;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.1));
    }

    /* Voted ribbon */
    .voted-ribbon {
      display: none;
      position: absolute;
      top: 10px;
      right: 0;
      background: var(--voted);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 8px 3px 7px;
      border-radius: 3px 0 0 3px;
      letter-spacing: 0.06em;
      z-index: 2;
      white-space: nowrap;
    }

    .card.voted .voted-ribbon { display: block; }

    /* Compact card body */
    .card-body {
      padding: 9px 10px 11px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .card-top {
      display: flex;
      gap: 7px;
      align-items: flex-start;
    }

    .app-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.06);
    }

    .card-meta { flex: 1; min-width: 0; }

    .card-name {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 1px;
      line-height: 1.3;
    }

    .card.voted .card-name { color: var(--voted); }

    .card-team {
      font-size: 10.5px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-badge {
      display: inline-block;
      font-size: 9.5px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.02em;
    }

    .badge-superparent { background: #FAE6C2; color: #854F0B; }
    .badge-companion   { background: #EEEDFE; color: #3C3489; }
    .badge-lifeos      { background: #CCF0E3; color: #0D6B50; }
    .badge-body        { background: #D4E8FA; color: #185FA5; }
    .badge-wildcard    { background: #E5E3DC; color: #5F5E5A; }

    .card-desc {
      font-size: 11px;
      color: var(--text2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Vote row */
    .vote-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .vote-count {
      display: flex;
      align-items: baseline;
      gap: 3px;
      min-width: 0;
    }

    .vote-number {
      font-size: 20px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    .card.voted .vote-number { color: var(--voted); }

    .vote-word {
      font-size: 10px;
      font-weight: 500;
      color: var(--text3);
    }

    .vote-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 11px;
      border-radius: 20px;
      border: 1.5px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      user-select: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .vote-btn:active { transform: scale(0.90); }
    .vote-btn.can-vote { border-color: var(--text); }
    .vote-btn.can-vote:active { background: var(--text); color: #fff; }

    .vote-btn.voted-state {
      background: var(--voted);
      border-color: var(--voted);
      color: #fff;
    }

    .vote-btn.voted-addmore {
      background: transparent;
      border-color: var(--voted);
      color: var(--voted);
    }

    .vote-btn.disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    /* ── Overlay + Bottom Sheet ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 25, 22, 0.55);
      z-index: 200;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .overlay.visible { display: block; }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      padding: 8px 20px 48px;
      z-index: 201;
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .sheet.open { transform: translateX(-50%) translateY(0); }

    .sheet-handle {
      width: 38px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 20px;
    }

    .sheet-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .sheet-app-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
    }

    .sheet-icon {
      width: 44px;
      height: 44px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.06);
    }

    .sheet-app-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .sheet-team {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    /* Previous vote note */
    .sheet-prev-note {
      display: none;
      font-size: 12px;
      color: var(--voted);
      font-weight: 600;
      background: #E8F7F1;
      border-radius: 8px;
      padding: 7px 12px;
      margin-bottom: 14px;
    }

    .sheet-prev-note.visible { display: block; }

    /* ── Vote Quantity Stepper ── */
    .stepper-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      text-align: center;
      margin: 14px 0 10px;
    }

    .stepper-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 10px;
    }

    .stepper-btn {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: 1.5px solid var(--border2);
      background: var(--surface);
      font-size: 24px;
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: inherit;
      user-select: none;
      line-height: 1;
    }

    .stepper-btn:active:not(:disabled) {
      transform: scale(0.90);
      background: var(--surface2);
    }

    .stepper-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .stepper-num {
      font-size: 42px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.03em;
      min-width: 72px;
      text-align: center;
      line-height: 1;
    }

    .stepper-sublabel {
      font-size: 12px;
      color: var(--text3);
      text-align: center;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .stepper-sublabel strong { color: var(--text2); font-weight: 700; }

    /* Notice */
    .sheet-notice {
      background: var(--surface2);
      border-radius: 10px;
      padding: 11px 13px;
      font-size: 12.5px;
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .sheet-notice strong { color: var(--text); font-weight: 700; }

    .sheet-actions { display: flex; gap: 10px; }

    .btn-cancel {
      flex: 1;
      padding: 14px;
      border-radius: 13px;
      border: 1.5px solid var(--border2);
      background: transparent;
      color: var(--text2);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .btn-cancel:active { background: var(--surface2); transform: scale(0.97); }

    .btn-confirm {
      flex: 2;
      padding: 14px;
      border-radius: 13px;
      border: none;
      background: var(--text);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .btn-confirm:active { transform: scale(0.97); background: #333; }

    /* ── My Votes ── */
    .my-votes-wrap {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-top: 6px;
    }

    .my-votes-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }

    .my-votes-label { font-size: 13px; font-weight: 700; color: var(--text); }

    .my-votes-counter {
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      background: var(--surface2);
      padding: 3px 10px;
      border-radius: 10px;
    }

    .my-votes-list {
      padding: 10px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .my-vote-row { display: flex; align-items: center; gap: 10px; }

    .my-vote-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .my-vote-info { flex: 1; min-width: 0; }

    .my-vote-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .my-vote-team { font-size: 11.5px; color: var(--text3); }

    .my-vote-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--voted);
      background: #E8F7F1;
      padding: 3px 8px;
      border-radius: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .my-votes-empty {
      padding: 20px 16px;
      font-size: 13px;
      color: var(--text3);
      line-height: 1.65;
      text-align: center;
    }

    /* ── Closed banner ── */
    .closed-banner {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }

    .closed-banner strong { display: block; font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .closed-banner span   { font-size: 12.5px; color: var(--text3); line-height: 1.6; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 56px 20px; }
    .empty-icon  { font-size: 44px; margin-bottom: 16px; }
    .empty-title { font-size: 16px; font-weight: 800; color: var(--text2); margin-bottom: 6px; }
    .empty-desc  { font-size: 13px; color: var(--text3); line-height: 1.65; }

    /* ── Animations ── */
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(0.65); }
    }

    @keyframes number-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.4); color: var(--voted); }
      100% { transform: scale(1); }
    }

    .number-pop { animation: number-pop 0.38s cubic-bezier(0.34, 1.56, 0.64, 1); }

    @keyframes card-flash {
      0%   { box-shadow: 0 0 0 0 rgba(29, 158, 117, 0); }
      35%  { box-shadow: 0 0 0 5px rgba(29, 158, 117, 0.22); }
      100% { box-shadow: 0 0 0 0 rgba(29, 158, 117, 0); }
    }

    .card-voted-flash { animation: card-flash 0.6s ease-out; }
  </style>
</head>
<body>
<div class="app-wrap">

  <!-- ── STICKY HEADER ── -->
  <div class="header">
    <div class="header-row">
      <div>
        <div class="event-eyebrow">Eazo Hackathon 2026 · SF</div>
        <div class="event-name">Community Vote</div>
      </div>
      <div class="votes-pill-wrap">
        <div class="votes-pill" id="votesPill">
          <div class="pulse-dot"></div>
          <span id="votesText">10 votes left</span>
        </div>
        <div class="pip-row" id="pipRow"></div>
      </div>
    </div>
    <div class="countdown-row">
      <div class="live-label" id="liveLabel">
        <div class="live-dot"></div>
        Live Voting
      </div>
      <div class="countdown-right">
        <span>Closes 7:00 PM PT ·</span>
        <span class="countdown-time" id="countdownEl">--h --m</span>
      </div>
    </div>
  </div>

  <!-- ── FILTER BAR ── -->
  <div class="filter-bar">
    <span class="filter-label">Sort</span>
    <button class="filter-pill active" data-group="sort" data-val="time"  onclick="setSort('time',this)">Newest First</button>
    <button class="filter-pill"        data-group="sort" data-val="votes" onclick="setSort('votes',this)">Most Votes</button>
  </div>

  <!-- ── MAIN CONTENT ── -->
  <div class="content" id="content"></div>

</div>

<!-- ── OVERLAY ── -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- ── VOTE CONFIRMATION SHEET ── -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-eyebrow">Cast Your Votes</div>

  <div class="sheet-app-row">
    <div class="sheet-icon" id="sheetIcon"></div>
    <div>
      <div class="sheet-app-name" id="sheetName"></div>
      <div class="sheet-team"     id="sheetTeam"></div>
    </div>
  </div>

  <div class="sheet-prev-note" id="sheetPrevNote"></div>

  <div class="stepper-label">How many votes?</div>

  <div class="stepper-row">
    <button class="stepper-btn" id="stepperMinus" onclick="adjustVotes(-1)">−</button>
    <div class="stepper-num" id="stepperNum">1</div>
    <button class="stepper-btn" id="stepperPlus"  onclick="adjustVotes(1)">+</button>
  </div>

  <div class="stepper-sublabel" id="stepperSublabel"></div>

  <div class="sheet-notice">
    <strong>Votes are final.</strong> Once cast they cannot be changed or undone. Each vote counts toward this team's ranking.
  </div>

  <div class="sheet-actions">
    <button class="btn-cancel"  onclick="closeSheet()">Cancel</button>
    <button class="btn-confirm" id="btnConfirm" onclick="confirmVote()">Cast 1 Vote</button>
  </div>
</div>

<script>
  // ── CONFIG ────────────────────────────────────────────────────────────────
  const MAX_VOTES = 10;
  // Voting closes May 24 2026 at 7:00 PM PDT (UTC-7) = 02:00 UTC May 25
  const VOTE_DEADLINE = new Date('2026-05-25T02:00:00Z');

  // ── STATE ─────────────────────────────────────────────────────────────────
  // voteMap: { projectId → total votes given by this user }
  let voteMap   = {};
  let pendingId = null;
  let pendingVoteCount = 1;
  let sortMode  = 'time';

  function totalVotesUsed()      { return Object.values(voteMap).reduce((s, n) => s + n, 0); }
  function votesForProject(id)   { return voteMap[id] || 0; }
  function remainingVotes()      { return MAX_VOTES - totalVotesUsed(); }
  function hasVotedFor(id)       { return votesForProject(id) > 0; }

  // ── MOCK DATA ─────────────────────────────────────────────────────────────
  // TODO: Replace with API — GET /api/hackathon/sf/projects
  // Response shape: { projects: Project[], voteMap: { [id]: number }, remainingVotes: number }
  // Project shape: { id, name, team, desc, track, votes, iconEmoji, iconBg, thumbUrl, submittedAt }
  // thumbUrl: URL to 9:16 app screenshot. null = show gradient placeholder.
  // All projects returned by this endpoint are SF hub only.
  const PROJECTS = [
    { id:'p01', name:'FamilySync AI',  team:'Team Harmony',   desc:'Smart family scheduler that syncs everyone\'s calendar, automates reminders, and fairly distributes household tasks.',             track:'superparent', votes:142, iconEmoji:'👨‍👩‍👧', iconBg:'#FAE6C2', thumbUrl:null, submittedAt:new Date('2026-05-23T18:30:00') },
    { id:'p02', name:'MindBuddy',      team:'Calm Stack',     desc:'Daily emotional check-ins with mood tracking and AI-powered coping suggestions, designed for ADHD and anxiety management.',         track:'companion',   votes:98,  iconEmoji:'🧠',    iconBg:'#EEEDFE', thumbUrl:null, submittedAt:new Date('2026-05-23T19:10:00') },
    { id:'p03', name:'GoalForge',      team:'Builders Inc',   desc:'AI second brain that breaks your goals into weekly micro-tasks and holds you accountable with a gentle morning check-in.',           track:'lifeos',      votes:211, iconEmoji:'⚡',    iconBg:'#CCF0E3', thumbUrl:null, submittedAt:new Date('2026-05-23T17:50:00') },
    { id:'p04', name:'PulseCoach',     team:'HealthLab',      desc:'Personalized recovery and training plans built from your HRV, sleep quality, and activity patterns across any wearable device.',    track:'body',        votes:77,  iconEmoji:'💓',    iconBg:'#D4E8FA', thumbUrl:null, submittedAt:new Date('2026-05-23T20:05:00') },
    { id:'p05', name:'NightWatch',     team:'Solo Founders',  desc:'AI-powered security camera analyzer that only alerts you when something truly matters. No more false alarm fatigue.',               track:'wildcard',    votes:55,  iconEmoji:'🌙',    iconBg:'#E5E3DC', thumbUrl:null, submittedAt:new Date('2026-05-23T20:40:00') },
    { id:'p06', name:'ChoreCoins',     team:'FamTech',        desc:'Gamified chore tracker for kids with reward points, a family leaderboard, and parent-approved prize redemptions.',                   track:'superparent', votes:112, iconEmoji:'🪙',    iconBg:'#FAE6C2', thumbUrl:null, submittedAt:new Date('2026-05-23T17:15:00') },
    { id:'p07', name:'FocusFlow',      team:'Deep Work Co',   desc:'Pomodoro-style focus timer with binaural beats, smart distraction blocking, and session analytics to help you maximize deep work.',  track:'lifeos',      votes:189, iconEmoji:'🎯',    iconBg:'#CCF0E3', thumbUrl:null, submittedAt:new Date('2026-05-23T16:30:00') },
    { id:'p08', name:'OmniJournal',    team:'Reflect Studio', desc:'Voice-first journaling that transcribes your thoughts, tags emotional patterns, and surfaces recurring life themes over time.',       track:'companion',   votes:158, iconEmoji:'📖',    iconBg:'#EEEDFE', thumbUrl:null, submittedAt:new Date('2026-05-23T15:20:00') },
    { id:'p09', name:'HabitGPT',       team:'Routine Labs',   desc:'Conversational habit coach that adapts your routine based on how your last week actually went — not just how you planned it.',        track:'lifeos',      votes:92,  iconEmoji:'🔄',    iconBg:'#CCF0E3', thumbUrl:null, submittedAt:new Date('2026-05-23T18:45:00') },
    { id:'p10', name:'SleepRx',        team:'Rest Well',      desc:'Sleep score tracker that analyzes your habits and delivers a personalised 7-day improvement protocol each week.',                     track:'body',        votes:63,  iconEmoji:'😴',    iconBg:'#D4E8FA', thumbUrl:null, submittedAt:new Date('2026-05-23T19:55:00') },
    { id:'p11', name:'DreamBox',       team:'Night Owls',     desc:'AI dream journal that interprets recurring themes and emotional patterns, then connects them to your waking-life goals.',             track:'wildcard',    votes:43,  iconEmoji:'💭',    iconBg:'#E5E3DC', thumbUrl:null, submittedAt:new Date('2026-05-23T21:00:00') },
  ];

  const TRACK_LABEL = {
    superparent: 'Superparent',
    companion:   'AI Companion',
    lifeos:      'Life OS',
    body:        'Body Intel',
    wildcard:    'Wildcard',
  };

  const TRACK_GRADIENT = {
    superparent: 'linear-gradient(140deg, #FAE6C2 0%, #F5CF8A 100%)',
    companion:   'linear-gradient(140deg, #EEEDFE 0%, #D4D0FC 100%)',
    lifeos:      'linear-gradient(140deg, #CCF0E3 0%, #96DBBF 100%)',
    body:        'linear-gradient(140deg, #D4E8FA 0%, #9DCAF0 100%)',
    wildcard:    'linear-gradient(140deg, #E5E3DC 0%, #CCC9BF 100%)',
  };

  // ── HELPERS ───────────────────────────────────────────────────────────────
  function isVotingOpen() { return Date.now() < VOTE_DEADLINE.getTime(); }

  // ── COUNTDOWN ─────────────────────────────────────────────────────────────
  function tickCountdown() {
    const diff = VOTE_DEADLINE - Date.now();
    const el   = document.getElementById('countdownEl');
    const live = document.getElementById('liveLabel');
    if (!el) return;

    if (diff <= 0) {
      el.outerHTML = '<span class="countdown-closed">Voting closed</span>';
      live.style.opacity = '0.4';
      renderAll();
      return;
    }

    const h = Math.floor(diff / 3_600_000);
    const m = Math.floor((diff % 3_600_000) / 60_000);
    const s = Math.floor((diff % 60_000)    / 1_000);

    el.textContent = h < 1 ? `${m}m ${s}s` : `${h}h ${m}m`;
    el.classList.toggle('urgent', h < 1);
  }

  // ── REMAINING VOTES UI ────────────────────────────────────────────────────
  function updateRemainingUI() {
    const remaining = remainingVotes();
    const pill = document.getElementById('votesPill');
    const txt  = document.getElementById('votesText');

    txt.textContent = remaining === 0
      ? 'No votes left'
      : `${remaining} vote${remaining !== 1 ? 's' : ''} left`;

    pill.classList.toggle('low',   remaining <= 2 && remaining > 0);
    pill.classList.toggle('empty', remaining === 0);

    const pipRow = document.getElementById('pipRow');
    pipRow.innerHTML = Array.from({ length: MAX_VOTES }, (_, i) =>
      `<div class="pip${i < totalVotesUsed() ? ' used' : ''}"></div>`
    ).join('');
  }

  // ── SORT ──────────────────────────────────────────────────────────────────
  function setSort(val, el) {
    sortMode = val;
    document.querySelectorAll('[data-group="sort"]').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    renderAll();
  }

  function sortedProjects() {
    const list = [...PROJECTS];
    return sortMode === 'votes'
      ? list.sort((a, b) => b.votes - a.votes)
      : list.sort((a, b) => b.submittedAt - a.submittedAt);
  }

  // ── STEPPER ───────────────────────────────────────────────────────────────
  function adjustVotes(delta) {
    const max = remainingVotes();
    pendingVoteCount = Math.max(1, Math.min(max, pendingVoteCount + delta));
    updateStepperUI();
  }

  function updateStepperUI() {
    const max = remainingVotes();
    document.getElementById('stepperNum').textContent = pendingVoteCount;
    document.getElementById('stepperMinus').disabled  = pendingVoteCount <= 1;
    document.getElementById('stepperPlus').disabled   = pendingVoteCount >= max;

    const after = max - pendingVoteCount;
    document.getElementById('stepperSublabel').innerHTML =
      after === 0
        ? `Using your last <strong>${pendingVoteCount}</strong> vote${pendingVoteCount !== 1 ? 's' : ''}`
        : `<strong>${after}</strong> vote${after !== 1 ? 's' : ''} remaining after this`;

    const label = pendingVoteCount === 1 ? 'Cast 1 Vote' : `Cast ${pendingVoteCount} Votes`;
    document.getElementById('btnConfirm').textContent = label;
  }

  // ── SHEET ─────────────────────────────────────────────────────────────────
  function openSheet(id) {
    if (!isVotingOpen())          return;
    if (remainingVotes() <= 0)    return;

    const p = PROJECTS.find(x => x.id === id);
    if (!p) return;

    pendingId        = id;
    pendingVoteCount = 1;

    document.getElementById('sheetIcon').textContent      = p.iconEmoji;
    document.getElementById('sheetIcon').style.background = p.iconBg;
    document.getElementById('sheetName').textContent      = p.name;
    document.getElementById('sheetTeam').textContent      = `by ${p.team}`;

    const prevNote = document.getElementById('sheetPrevNote');
    const given    = votesForProject(id);
    if (given > 0) {
      prevNote.textContent = `You've already given ${given} vote${given !== 1 ? 's' : ''} to this project`;
      prevNote.classList.add('visible');
    } else {
      prevNote.classList.remove('visible');
    }

    updateStepperUI();
    document.getElementById('overlay').classList.add('visible');
    document.getElementById('sheet').classList.add('open');
  }

  function closeSheet() {
    document.getElementById('overlay').classList.remove('visible');
    document.getElementById('sheet').classList.remove('open');
    pendingId = null;
  }

  function confirmVote() {
    if (!pendingId || pendingVoteCount < 1) return;
    const id    = pendingId;
    const count = pendingVoteCount;
    const p     = PROJECTS.find(x => x.id === id);
    if (!p) return;

    // TODO: POST /api/hackathon/sf/vote  body: { projectId: id, count }
    // On API error → show toast, do not update local state

    voteMap[id]  = (voteMap[id] || 0) + count;
    p.votes     += count;

    closeSheet();
    updateRemainingUI();
    renderAll();

    requestAnimationFrame(() => {
      const numEl  = document.getElementById(`vnum-${id}`);
      const cardEl = document.getElementById(`card-${id}`);
      if (numEl)  { numEl.classList.add('number-pop');       setTimeout(() => numEl.classList.remove('number-pop'), 420); }
      if (cardEl) { cardEl.classList.add('card-voted-flash'); setTimeout(() => cardEl.classList.remove('card-voted-flash'), 650); }
    });
  }

  // ── RENDER CARD ───────────────────────────────────────────────────────────
  function renderCard(p) {
    const given  = votesForProject(p.id);
    const voted  = given > 0;
    const open   = isVotingOpen();
    const noLeft = remainingVotes() <= 0;

    let btnClass  = 'vote-btn';
    let btnLabel  = '♡  Vote';
    let btnAction = '';

    if (!open) {
      btnClass += ' disabled';
      btnLabel  = 'Closed';
    } else if (voted && noLeft) {
      btnClass += ' voted-state disabled';
      btnLabel  = `✓  ${given}`;
    } else if (voted && !noLeft) {
      btnClass += ' voted-addmore';
      btnLabel  = `✓  ${given}  +`;
      btnAction = `onclick="openSheet('${p.id}')"`;
    } else if (!voted && noLeft) {
      btnClass += ' disabled';
      btnLabel  = 'No votes left';
    } else {
      btnClass += ' can-vote';
      btnAction  = `onclick="openSheet('${p.id}')"`;
    }

    const ribbonText = voted ? `✓ ${given} vote${given !== 1 ? 's' : ''}` : '';

    const thumbHtml = p.thumbUrl
      ? `<img src="${p.thumbUrl}" alt="${p.name} preview" loading="lazy">`
      : `<div class="thumb-placeholder" style="background:${TRACK_GRADIENT[p.track]}">
           <div class="thumb-placeholder-icon">${p.iconEmoji}</div>
         </div>`;

    return `
      <div class="card${voted ? ' voted' : ''}" id="card-${p.id}">
        <div class="voted-ribbon">${ribbonText}</div>
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-top">
            <div class="app-icon" style="background:${p.iconBg}">${p.iconEmoji}</div>
            <div class="card-meta">
              <div class="card-name">${p.name}</div>
              <div class="card-team">by ${p.team}</div>
              <span class="track-badge badge-${p.track}">${TRACK_LABEL[p.track]}</span>
            </div>
          </div>
          <div class="card-desc">${p.desc}</div>
          <div class="vote-row">
            <div class="vote-count">
              <div class="vote-number" id="vnum-${p.id}">${p.votes.toLocaleString()}</div>
              <div class="vote-word">votes</div>
            </div>
            <button class="${btnClass}" ${btnAction}>${btnLabel}</button>
          </div>
        </div>
      </div>`;
  }

  // ── RENDER MY VOTES ───────────────────────────────────────────────────────
  function renderMyVotes() {
    const voted = PROJECTS.filter(p => hasVotedFor(p.id));
    const used  = totalVotesUsed();

    const inner = voted.length === 0
      ? `<div class="my-votes-empty">You haven't voted yet.<br>Tap Vote on any project to get started.</div>`
      : `<div class="my-votes-list">${voted.map(p => {
          const n = votesForProject(p.id);
          return `
            <div class="my-vote-row">
              <div class="my-vote-icon" style="background:${p.iconBg}">${p.iconEmoji}</div>
              <div class="my-vote-info">
                <div class="my-vote-name">${p.name}</div>
                <div class="my-vote-team">${p.team}</div>
              </div>
              <div class="my-vote-badge">${n} vote${n !== 1 ? 's' : ''}</div>
            </div>`;
        }).join('')}
        </div>`;

    return `
      <div class="my-votes-wrap">
        <div class="my-votes-head">
          <div class="my-votes-label">My Votes</div>
          <div class="my-votes-counter">${used} / ${MAX_VOTES} used</div>
        </div>
        ${inner}
      </div>`;
  }

  // ── FULL RENDER ───────────────────────────────────────────────────────────
  function renderAll() {
    const content = document.getElementById('content');
    const open    = isVotingOpen();
    const list    = sortedProjects();
    const total   = PROJECTS.reduce((s, p) => s + p.votes, 0);
    let   html    = '';

    if (!open) {
      html += `
        <div class="closed-banner">
          <strong>Voting has closed</strong>
          <span>Thank you for participating! Results will be announced at the awards ceremony.</span>
        </div>`;
    }

    if (list.length === 0) {
      html += `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No submissions yet</div>
          <div class="empty-desc">Projects will appear here as teams submit their work.<br>Check back soon!</div>
        </div>`;
    } else {
      html += `<div class="stats-line">${list.length} projects · <strong>${total.toLocaleString()}</strong> total votes cast</div>`;
      html += `<div class="cards-grid">${list.map(renderCard).join('')}</div>`;
    }

    html += renderMyVotes();
    content.innerHTML = html;
  }

  // ── SIMULATED LIVE VOTE COUNTS ─────────────────────────────────────────────
  // TODO: Replace with WebSocket or polling — GET /api/hackathon/sf/vote-counts
  // On response: call updateVoteCount(projectId, newCount) for each changed project.
  function updateVoteCount(projectId, newCount) {
    const p = PROJECTS.find(x => x.id === projectId);
    if (!p) return;
    p.votes = newCount;

    const numEl = document.getElementById(`vnum-${projectId}`);
    if (numEl) {
      numEl.textContent = p.votes.toLocaleString();
      numEl.classList.add('number-pop');
      setTimeout(() => numEl.classList.remove('number-pop'), 420);
    }

    const total = PROJECTS.reduce((s, x) => s + x.votes, 0);
    document.querySelectorAll('.stats-line').forEach(el => {
      el.innerHTML = `${PROJECTS.length} projects · <strong>${total.toLocaleString()}</strong> total votes cast`;
    });
  }

  function _simulateLive() {
    if (!isVotingOpen()) return;
    const p = PROJECTS[Math.floor(Math.random() * PROJECTS.length)];
    updateVoteCount(p.id, p.votes + Math.floor(Math.random() * 4) + 1);
  }

  // ── INIT ──────────────────────────────────────────────────────────────────
  // Exposed for native WebView:
  // window.refreshData      = () => fetchProjects().then(renderAll);
  // window.receiveAuthToken = (token) => { AUTH_TOKEN = token; fetchVotedIds(); };

  updateRemainingUI();
  renderAll();
  tickCountdown();
  setInterval(tickCountdown, 1_000);
  setInterval(_simulateLive, 3_800);
</script>
