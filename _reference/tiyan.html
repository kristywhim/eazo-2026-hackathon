<title>Eazo Hackathon — 选手参赛体验链路 v5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F9F8F5;color:#1A1916;padding:24px 16px 72px;min-height:100vh}
.wrap{max-width:680px;margin:0 auto}
.pg-header{margin-bottom:24px}
.pg-header .eye{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#888780;margin-bottom:6px}
.pg-header h1{font-size:20px;font-weight:600;color:#1A1916}
.pg-header .sub{font-size:13px;color:#888780;margin-top:4px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px}
.pill{padding:4px 11px;border-radius:20px;font-size:11.5px;font-weight:500;border:0.5px solid}
.day-sep{display:flex;align-items:center;gap:12px;margin:26px 0 14px}
.day-sep .ln{flex:1;height:1px;background:#D3D1C7}
.day-sep .lb{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#888780;padding:4px 12px;border:0.5px solid #D3D1C7;border-radius:20px;white-space:nowrap}
.phase{border:0.5px solid #D3D1C7;border-radius:10px;background:#fff;margin-bottom:8px;overflow:hidden}
.phase.open{box-shadow:0 0 0 1.5px #B0ADAA}
.ph{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none}
.ph:hover{background:#F7F6F2}
.badge{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ph-info{flex:1;min-width:0}
.ph-lbl{font-size:10px;color:#888780;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}
.ph-name{font-size:14px;font-weight:500;color:#1A1916}
.ph-meta{font-size:11px;color:#888780;text-align:right;flex-shrink:0}
.chev{font-size:18px;color:#B0ADAA;transition:transform .2s;flex-shrink:0;line-height:1}
.body{display:none;padding:0 16px 16px;border-top:0.5px solid #EAE8E2}
.body.open{display:block}
.sec{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888780;margin:14px 0 8px}
.steps{display:flex;flex-direction:column;gap:7px}
.step{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:#1A1916;line-height:1.55}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
/* timeline */
.tl{margin-top:4px}
.tl-row{display:flex;align-items:stretch;font-size:12.5px;gap:0}
.tl-left{display:flex;flex-direction:column;align-items:flex-end;width:86px;flex-shrink:0;padding-right:12px}
.tl-time{font-size:10.5px;font-family:'SF Mono',Menlo,monospace;color:#888780;padding-top:3px;white-space:nowrap}
.tl-mid{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0}
.tl-node{width:8px;height:8px;border-radius:50%;border:1.5px solid #D3D1C7;margin-top:4px;flex-shrink:0}
.tl-bar{width:1px;background:#E5E3DC;flex:1;margin-top:2px}
.tl-right{flex:1;padding:2px 0 12px 10px}
.tl-ev{color:#1A1916;line-height:1.5}
.tl-ev b{font-weight:600}
.tl-ev .sub{font-size:11.5px;color:#888780;display:block;margin-top:1px}
.tl-row:last-child .tl-bar{display:none}
/* break row */
.tl-break{background:#FAEEDA;border-radius:6px;margin:2px 0 6px;padding:6px 10px;font-size:12px;color:#854F0B;display:flex;align-items:center;gap:6px}
.tl-break .bi{font-size:13px}
/* inline badge */
.ib{display:inline-block;font-size:10px;font-weight:600;padding:1px 7px;border-radius:3px;margin-left:5px;vertical-align:middle}
/* boxes */
.hbox{border-radius:8px;padding:10px 14px;margin-top:8px;font-size:12.5px;line-height:1.65}
.hb-a{background:#FAEEDA;border-left:3px solid #BA7517}
.hb-g{background:#EAF3DE;border-left:3px solid #5A9E25}
.hb-p{background:#EEEDFE;border-left:3px solid #534AB7}
.hb-b{background:#E6F1FB;border-left:3px solid #185FA5}
/* share box */
.share-box{background:#F1EFE8;border-radius:8px;padding:11px 14px;margin-top:10px}
.sh-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888780;margin-bottom:8px}
.sp{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;color:#1A1916;line-height:1.5;margin-bottom:6px}
.sp:last-child{margin-bottom:0}
.sp-ic{font-size:14px;flex-shrink:0;margin-top:1px}
/* score grid */
.scores{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.sc{background:#F1EFE8;border-radius:8px;padding:10px;text-align:center}
.sc .pct{font-size:20px;font-weight:700}
.sc .desc{font-size:11px;color:#888780;margin-top:2px;white-space:pre-line;line-height:1.4}
/* tz */
.tz{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.tz-c{background:#F1EFE8;border-radius:8px;padding:8px 6px;text-align:center}
.tz-c .city{font-size:11.5px;font-weight:500}
.tz-c .time{font-size:10.5px;color:#888780;margin-top:2px;white-space:pre-line;line-height:1.4}
/* awards */
.awards{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.aw{display:flex;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;align-items:flex-start}
.aw .ico{font-size:16px;flex-shrink:0;margin-top:1px}
.aw .an{font-weight:600}
.aw .ad{font-size:11.5px;color:#888780;margin-top:2px}
.aw-a{background:#FAEEDA}
.aw-b{background:#E6F1FB}
/* connector */
.connector{width:1px;height:8px;background:#D3D1C7;margin-left:27px}
/* tracks */
.tracks{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.track{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border-radius:8px;border:0.5px solid #D3D1C7;font-size:13px}
.track-num{font-size:10px;font-weight:700;color:#888780;font-family:'SF Mono',monospace;flex-shrink:0;width:18px;margin-top:1px}
.track-body{flex:1}
.track-name{font-weight:600;color:#1A1916;margin-bottom:2px}
.track-en{font-size:11px;color:#888780;font-weight:400}
.track-desc{font-size:11.5px;color:#888780;line-height:1.5;margin-top:2px}
.t1{background:#FFF3E5;border-color:#FABB7A}.t2{background:#F0EEFF;border-color:#B4AAEE}
.t3{background:#E5F5EE;border-color:#7DCFAA}.t4{background:#E8F4FF;border-color:#7BBCE8}
.t5{background:#F1EFE8;border-color:#D3D1C7}
/* award new styles */
.award-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.astat{background:#F1EFE8;border-radius:8px;padding:10px;text-align:center}
.astat .av{font-size:18px;font-weight:700;color:#1A1916;line-height:1.2}
.astat .al{font-size:11px;color:#888780;margin-top:3px}
.award-section{margin-top:12px}
.award-section-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888780;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.award-section-title::after{content:'';flex:1;height:1px;background:#E5E3DC}
.award-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;font-size:13px;margin-bottom:5px}
.award-row:last-child{margin-bottom:0}
.award-rank{font-size:16px;flex-shrink:0;width:26px;text-align:center}
.award-name{flex:1;font-weight:500;color:#1A1916}
.award-sub{font-size:11.5px;color:#888780;font-weight:400}
.award-prize{font-size:13px;font-weight:700;white-space:nowrap}
.aw-global{background:#FAE6C2}
.aw-region{background:#E6F1FB}
.aw-badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}
.aw-badge{background:#F1EFE8;border-radius:8px;padding:9px 10px;text-align:center}
.aw-badge .bi{font-size:18px;margin-bottom:4px}
.aw-badge .bn{font-size:12px;font-weight:600;color:#1A1916}
.aw-badge .bd{font-size:11px;color:#888780;margin-top:2px;line-height:1.4}
.region-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0}
.rg-card{background:#F1EFE8;border-radius:8px;padding:8px;text-align:center}
.rg-card .rc{font-size:18px}
.rg-card .rn{font-size:11.5px;font-weight:600;color:#1A1916;margin-top:3px}
.rg-card .ra{font-size:11px;color:#888780;margin-top:2px}
/* badge colors */
.bg-gray{background:#E5E3DC;color:#5F5E5A}
.bg-teal{background:#CCF0E3;color:#0D6B50}
.bg-purple{background:#E5E3FD;color:#3C3489}
.bg-amber{background:#FAE6C2;color:#854F0B}
.bg-blue{background:#D4E8FA;color:#185FA5}
.bg-coral{background:#FAE0D8;color:#993C1D}
.bg-green{background:#D8EFC4;color:#3B6D11}
.d-gray{background:#B0ADAA}.d-teal{background:#1D9E75}.d-purple{background:#534AB7}
.d-amber{background:#BA7517}.d-blue{background:#378ADD}.d-coral{background:#D85A30}
.d-green{background:#5A9E25}
.ib-p{background:#EEEDFE;color:#534AB7}
.ib-t{background:#CCF0E3;color:#0D6B50}
.ib-a{background:#FAE6C2;color:#854F0B}
.ib-r{background:#FAE0D8;color:#993C1D}
.ib-b{background:#E6F1FB;color:#185FA5}
.ib-g{background:#D8EFC4;color:#3B6D11}
.pill-t{background:#CCF0E3;color:#0D6B50;border-color:#8DD9BC}
.pill-a{background:#FAE6C2;color:#854F0B;border-color:#FAC775}
.pill-r{background:#FAE0D8;color:#993C1D;border-color:#F0997B}
.pill-b{background:#D4E8FA;color:#185FA5;border-color:#85B7EB}
</style>
</head>

const dotColorMap = {
  'd-gray':'#B0ADAA','d-teal':'#1D9E75','d-purple':'#534AB7',
  'd-amber':'#BA7517','d-blue':'#378ADD','d-coral':'#D85A30','d-green':'#5A9E25'
};

function buildTl(rows) {
  let html = '<div class="tl">';
  rows.forEach((r, i) => {
    const isLast = i === rows.length - 1;
    const nodeColor = dotColorMap[r.col] || '#D3D1C7';
    html += `<div class="tl-row">
      <div class="tl-left"><span class="tl-time">${r.time}</span></div>
      <div class="tl-mid">
        <div class="tl-node" style="border-color:${nodeColor}"></div>
        ${!isLast ? '<div class="tl-bar"></div>' : ''}
      </div>
      <div class="tl-right"><div class="tl-ev">${r.ev}</div></div>
    </div>`;
    if(r.break_text){
      html += `<div class="tl-break" style="margin-left:100px"><span class="bi">💬</span>${r.break_text}</div>`;
    }
  });
  html += '</div>';
  return html;
}

function render(){
  const track = document.getElementById('track');
  let lastDay = null;
  phases.forEach((p, i) => {
    if(p.day && p.day !== lastDay){
      const dl = document.createElement('div');
      dl.className = 'day-sep';
      dl.innerHTML = `<div class="ln"></div><div class="lb">${p.day}</div><div class="ln"></div>`;
      track.appendChild(dl);
      lastDay = p.day;
    }
    const el = document.createElement('div');
    el.className = 'phase';
    el.id = 'phase-' + p.id;
    let html = `<div class="ph" onclick="tog('${p.id}')">
      <div class="badge ${p.bg}">${p.num}</div>
      <div class="ph-info">
        <div class="ph-lbl">${p.lbl}</div>
        <div class="ph-name">${p.name}</div>
      </div>
      <div class="ph-meta">${p.meta}</div>
      <div class="chev" id="chev-${p.id}">›</div>
    </div>
    <div class="body" id="body-${p.id}">`;

    p.sections.forEach(s => {
      if(s.t) html += `<div class="sec">${s.t}</div>`;
      if(s.steps){
        html += '<div class="steps">';
        s.steps.forEach(st => { html += `<div class="step"><span class="dot ${p.dot}"></span><span>${st}</span></div>`; });
        html += '</div>';
      }
      if(s.tl) html += buildTl(s.tl);
      if(s.tz){
        html += '<div class="tz">';
        s.tz.forEach(z => { html += `<div class="tz-c"><div class="city">${z.city}</div><div class="time">${z.time}</div></div>`; });
        html += '</div>';
      }
      if(s.scores){
        html += '<div class="scores">';
        s.scores.forEach(sc => { html += `<div class="sc"><div class="pct">${sc.pct}</div><div class="desc">${sc.desc}</div></div>`; });
        html += '</div>';
      }
      if(s.hbox){
        const cls = {a:'hb-a',g:'hb-g',p:'hb-p',b:'hb-b'}[s.hbox]||'hb-a';
        html += `<div class="hbox ${cls}">${s.text}</div>`;
      }
      if(s.share){
        html += '<div class="share-box"><div class="sh-title">📱 Push 清单</div>';
        s.share.forEach(sh => { html += `<div class="sp"><span class="sp-ic">${sh.ic}</span><span>${sh.text}</span></div>`; });
        html += '</div>';
      }
      if(s.awardFull){
        html += buildAwards();
      }
      if(s.tracks){
        html += buildTracks();
      }
      if(s.awards){
        html += '<div class="awards">';
        s.awards.forEach(a => {
          html += `<div class="aw ${a.cls}"><span class="ico">${a.ico}</span><div><div class="an">${a.name}</div><div class="ad">${a.desc}</div></div></div>`;
        });
        html += '</div>';
      }
    });

    html += '</div>';
    el.innerHTML = html;
    track.appendChild(el);
    if(i < phases.length - 1 && !phases[i+1].day){
      const c = document.createElement('div');
      c.className = 'connector';
      track.appendChild(c);
    }
  });
}

function tog(id){
  const body = document.getElementById('body-' + id);
  const phase = document.getElementById('phase-' + id);
  const chev = document.getElementById('chev-' + id);
  const open = body.classList.toggle('open');
  phase.classList.toggle('open', open);
  chev.style.transform = open ? 'rotate(90deg)' : '';
}
